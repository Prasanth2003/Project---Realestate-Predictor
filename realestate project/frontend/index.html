<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real Estate Prediction</title>
    <!-- Use Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Real Estate Predictor</h1>
            <p>Calculate the likelihood of a property purchase</p>
        </header>
        
        <main>
            <section class="card form-section">
                <h2>Customer & Property Details</h2>
                <form id="prediction-form">
                    <div class="form-group">
                        <label for="price">Property Price ($)</label>
                        <input type="number" id="price" required placeholder="e.g. 350000">
                    </div>
                    
                    <div class="form-group">
                        <label for="income">Customer Annual Income ($)</label>
                        <input type="number" id="income" required placeholder="e.g. 80000">
                    </div>
                    
                    <div class="form-group">
                        <label for="location">Location Type</label>
                        <select id="location" required>
                            <option value="downtown">Downtown</option>
                            <option value="suburbs">Suburbs</option>
                            <option value="rural">Rural</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="size">Property Size (sq ft)</label>
                        <input type="number" id="size" required placeholder="e.g. 1800">
                    </div>
                    
                    <div class="form-group">
                        <label for="amenities">Amenities</label>
                        <input type="text" id="amenities" placeholder="e.g. Pool, Garage, Gym">
                    </div>
                    
                    <button type="submit" class="btn-primary">Predict Purchase</button>
                </form>
            </section>
            
            <section class="results-section hidden" id="results-section">
                <div class="card result-card">
                    <h2>Prediction Result</h2>
                    <div class="result-display">
                        <div class="result-item">
                            <span class="label">Likelihood</span>
                            <span class="value" id="res-likelihood">--</span>
                        </div>
                        <div class="result-item">
                            <span class="label">Probability</span>
                            <span class="value" id="res-probability">--%</span>
                        </div>
                    </div>
                </div>
            </section>
            
            <section class="card history-section">
                <div class="history-header">
                    <h2>Recent Predictions</h2>
                    <button id="refresh-history" class="btn-secondary">Refresh</button>
                </div>
                <div class="table-responsive">
                    <table id="history-table">
                        <thead>
                            <tr>
                                <th>Price</th>
                                <th>Income</th>
                                <th>Location</th>
                                <th>Prediction</th>
                                <th>Prob.</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Data populated by JS -->
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
